# ============
# CI/CD Pipeline folosind GameCI
# GameCI docs: https://game.ci/docs
# SUGESTIE :
# git LFS pt asset-uri
# git lfs install && git lfs track "*.png" etc.

name: Unity CI
 
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  # pt manual activation
  workflow_dispatch:
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
 
env:
  UNITY_VERSION: 6000.4.4f1
  PROJECT_PATH: .
 
jobs:
  # ===========================================================================
  # JOB 1 — RUN TESTS
  # Ruleaza Edit Mode si PlayMode teste la fiecare push sau PR.
  # TO-DO: de implementat metode de [Test]/[UnityTest] in codul actual
  # ===========================================================================
  test:
    name: Run Unity Tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # !!!!!!!!!!
          fetch-depth: 0
 
      - name: Cache Unity Library folder
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-
 
      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: test-results/${{ matrix.testMode }}
          # Fail
          checkName: ${{ matrix.testMode }} Test Results
 
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}
          retention-days: 7
 
  # ===========================================================================
  # JOB 2 — BUILD ANDROID
  # Build la APK-ul pt Android. DOar pe pushes la main (nu PR)
  # ===========================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test # doar daca trec toate testele
    if: github.event_name == 'push'
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
 
      - name: Cache Unity Library folder
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-
 
      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          # UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: ""
          versioning: Semantic  # Auto increment
 
      - name: Upload Android build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build-${{ github.sha }}
          path: build/Android
          retention-days: 14
 
